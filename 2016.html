<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金權檔案 | 2016 政治獻金透明化查詢</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>


    <section id="landing-page">
        <header>
            <div class="logo">THE ARCHIVES</div>
        </header>
        
        <div class="hero">
            <h2 class="subtitle">追求透明，是民主的貴族義務</h2>
            <h1 class="title">金權檔案：誰在資助我們的權力？</h1>
            <p class="description">
                在繁華的選舉背後，是數字與利益的交織。我們整理了 2016 年立委選舉的政治獻金數據，
                讓每一筆流入權力核心的資金，都在陽光下無所遁形。
            </p>
            
            <div class="search-cta">
                <input type="text" id="main-search" placeholder="輸入參選人姓名或政黨...">
                <button id="search-btn">探索檔案</button>
            </div>


            <div class="example-queries">
                <span>熱門查詢：</span>
                <a href="#" onclick="quickSearch('柯建銘')">柯建銘</a>
                <a href="#" onclick="quickSearch('丁守中')">丁守中</a>
                <a href="#" onclick="quickSearch('民主進步黨')">民主進步黨</a>
            </div>
        </div>


        <div class="editors-picks">
            <h3>EDITOR'S PICKS / 焦點洞察</h3>
            <div class="pick-grid">
                <div class="pick-card">
                    <h4>最高總收入</h4>
                    <p class="pick-name">柯建銘</p>
                    <p class="pick-value">$51,641,147</p>
                </div>
                <div class="pick-card">
                    <h4>營利事業捐贈之冠</h4>
                    <p class="pick-name">邱志偉</p>
                    <p class="pick-value">2.1 億+ 企業資助</p>
                </div>
                <div class="pick-card">
                    <h4>高額匿名捐贈</h4>
                    <p class="pick-name">數據異常觀測</p>
                    <p class="pick-value">探索不具名金流</p>
                </div>
            </div>
        </div>
    </section>


    <section id="results-page" class="hidden">
        <nav class="breadcrumb">
            <a href="#" onclick="showLanding()">← 返回首頁</a>
        </nav>


        <div class="results-header">
            <h2>檢索結果</h2>
            <div class="controls">
                <select id="sort-select">
                    <option value="total">按總收入排序</option>
                    <option value="corporate">按企業捐贈排序</option>
                    <option value="votes">按得票數排序</option>
                </select>
            </div>
        </div>


        <div id="quick-summary" class="summary-bar">
            </div>


        <div id="results-list" class="list-container">
            </div>


        <div class="pagination">
            <button disabled>上一頁</button>
            <span class="page-info">第 1 頁，共 10 頁</span>
            <button>下一頁</button>
        </div>
    </section>


    <script src="script.js"></script>
</body>
</html>
